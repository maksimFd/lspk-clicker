<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Технические работы | Скоро вернёмся</title>
  <!-- Подключение Font Awesome для иконок (опционально, но делает красивее) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1e2b3c 0%, #0f1a26 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      color: #e0e7f0;
    }

    .maintenance-card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 2.5rem;
      padding: 2.8rem 2rem;
      max-width: 550px;
      width: 100%;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.08);
      text-align: center;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .icon-container {
      margin-bottom: 1.8rem;
    }

    .gear-icon {
      font-size: 4.5rem;
      color: #f6c358;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.4));
      animation: gentle-spin 8s infinite linear;
      display: inline-block;
    }

    @keyframes gentle-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 1rem;
      background: linear-gradient(to right, #f9d56e, #f8b042);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .subhead {
      font-size: 1.2rem;
      font-weight: 400;
      margin-bottom: 2.2rem;
      color: #ccd6e0;
      line-height: 1.5;
      border-bottom: 1px dashed rgba(255,255,255,0.2);
      padding-bottom: 1.5rem;
    }

    .status-badge {
      background: rgba(242, 153, 74, 0.15);
      color: #f6a64d;
      border: 1px solid rgba(246, 166, 77, 0.4);
      border-radius: 3rem;
      padding: 0.5rem 1.4rem;
      font-weight: 600;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 2rem;
      letter-spacing: 0.3px;
      backdrop-filter: blur(5px);
    }

    .status-badge i {
      font-size: 0.8rem;
      color: #f6a64d;
    }

    .info-text {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 1.5rem;
      padding: 1.5rem 1.2rem;
      margin-bottom: 2.3rem;
      font-size: 1rem;
      color: #cbd5e1;
      line-height: 1.6;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .info-text i {
      color: #f6c358;
      margin-right: 0.4rem;
    }

    .form-section {
      text-align: left;
      margin-top: 0.8rem;
    }

    .form-label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #d1d9e6;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
    }

    .input-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
    }

    .email-input {
      flex: 1 1 220px;
      background: rgba(10, 20, 30, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 3rem;
      padding: 0.9rem 1.4rem;
      font-size: 1rem;
      color: #f0f4fa;
      outline: none;
      backdrop-filter: blur(5px);
      transition: all 0.25s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .email-input::placeholder {
      color: #8b9bb5;
      font-weight: 300;
      font-size: 0.95rem;
    }

    .email-input:focus {
      border-color: #f6b83d;
      box-shadow: 0 0 0 3px rgba(246, 184, 61, 0.3);
      background: rgba(20, 30, 40, 0.8);
    }

    .notify-btn {
      background: #f6b83d;
      border: none;
      border-radius: 3rem;
      padding: 0.9rem 1.8rem;
      font-weight: 700;
      font-size: 1rem;
      color: #0f1a26;
      background: linear-gradient(135deg, #f9d56e, #f6a83d);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.3s;
      box-shadow: 0 8px 18px rgba(246, 168, 61, 0.35);
      border: 1px solid rgba(255, 255, 200, 0.3);
      letter-spacing: 0.4px;
      white-space: nowrap;
    }

    .notify-btn:hover {
      background: linear-gradient(135deg, #ffe08a, #f8b84a);
      box-shadow: 0 10px 22px rgba(246, 168, 61, 0.5);
      transform: scale(1.02);
      color: #000;
    }

    .notify-btn:active {
      transform: scale(0.97);
    }

    .message-area {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      min-height: 2.4rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: 0.2s;
    }

    .success-message {
      color: #a7e0a7;
      background: rgba(50, 100, 50, 0.2);
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
    }

    .error-message {
      color: #f9a89a;
      background: rgba(180, 60, 60, 0.2);
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
    }

    .footer-note {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #8b9bb5;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    .footer-note i {
      font-size: 0.7rem;
    }

    @media (max-width: 480px) {
      .maintenance-card {
        padding: 2rem 1.2rem;
        border-radius: 2rem;
      }
      h1 {
        font-size: 1.9rem;
      }
      .input-group {
        flex-direction: column;
        align-items: stretch;
      }
      .notify-btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="maintenance-card">
    
    <!-- Иконка с анимацией -->
    <div class="icon-container">
      <i class="fas fa-cog gear-icon"></i>
    </div>

    <!-- Основной заголовок -->
    <h1>Технические работы</h1>
    
    <!-- Подзаголовок -->
    <div class="subhead">
      Мы проводим плановое обновление системы.<br>Сайт временно недоступен.
    </div>

    <!-- Статус -->
    <div class="status-badge">
      <i class="fas fa-circle"></i> Ожидаемое завершение: <strong>сегодня 18:00 (МСК)</strong>
    </div>

    <!-- Дополнительная информация -->
    <div class="info-text">
      <i class="fas fa-tools"></i> Мы улучшаем производительность и добавляем новые функции. 
      Все данные в безопасности. Приносим извинения за неудобства.
    </div>

    <!-- Форма для уведомления -->
    <div class="form-section">
      <label class="form-label" for="emailInput">
        <i class="far fa-bell" style="margin-right: 4px;"></i> Узнать первым о запуске
      </label>
      
      <div class="input-group">
        <input 
          type="email" 
          id="emailInput" 
          class="email-input" 
          placeholder="Введите ваш email" 
          autocomplete="email"
          aria-label="Email для уведомления"
        >
        <button id="notifyButton" class="notify-btn">
          <i class="fas fa-paper-plane"></i> Сообщить
        </button>
      </div>
      
      <!-- Место для сообщений (успех/ошибка) -->
      <div id="formMessage" class="message-area"></div>
    </div>

    <!-- Маленькая сноска -->
    <div class="footer-note">
      <i class="far fa-clock"></i> Спасибо за терпение!
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // Получаем элементы DOM
      const emailInput = document.getElementById('emailInput');
      const notifyButton = document.getElementById('notifyButton');
      const formMessage = document.getElementById('formMessage');

      /**
       * Отображает сообщение пользователю (успех или ошибка)
       * @param {string} text - текст сообщения
       * @param {boolean} isSuccess - true если успех, false если ошибка
       */
      function showMessage(text, isSuccess = true) {
        if (!formMessage) return;
        
        // Очищаем предыдущие классы
        formMessage.className = 'message-area';
        
        if (!text) {
          formMessage.innerHTML = '';
          return;
        }
        
        // Добавляем соответствующий класс стилей
        formMessage.classList.add(isSuccess ? 'success-message' : 'error-message');
        
        // Иконка в зависимости от типа
        const icon = isSuccess ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-exclamation-circle"></i>';
        formMessage.innerHTML = `${icon} ${text}`;
      }

      /**
       * Простейшая валидация email
       * @param {string} email 
       * @returns {boolean}
       */
      function isValidEmail(email) {
        // Базовая проверка: есть @ и точка в домене, без пробелов
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailPattern.test(email.trim());
      }

      /**
       * Имитация отправки данных на сервер (без реального запроса)
       * @param {string} email 
       * @returns {Promise<{success: boolean, message?: string}>}
       */
      function mockSubscribeEmail(email) {
        // Симуляция асинхронной операции (например fetch)
        return new Promise((resolve) => {
          setTimeout(() => {
            // Для демонстрации: всегда успех, если email валиден.
            // В реальном коде здесь был бы запрос к API.
            if (isValidEmail(email)) {
              resolve({ 
                success: true, 
                message: `Готово! Мы отправим уведомление на ${email}` 
              });
            } else {
              resolve({ 
                success: false, 
                message: 'Пожалуйста, введите корректный email адрес.' 
              });
            }
          }, 800); // небольшая задержка для реалистичности
        });
      }

      /**
       * Обработчик нажатия на кнопку "Сообщить"
       */
      async function handleNotifyClick() {
        // Очищаем предыдущее сообщение
        showMessage('');
        
        const email = emailInput.value.trim();
        
        // Базовая проверка на пустое поле
        if (!email) {
          showMessage('Введите email адрес', false);
          emailInput.focus();
          return;
        }
        
        // Дополнительная проверка формата (дублируется в mock, но для UI хорошо)
        if (!isValidEmail(email)) {
          showMessage('Некорректный формат email. Пример: name@domain.ru', false);
          emailInput.focus();
          return;
        }
        
        // Блокируем кнопку и меняем текст, чтобы избежать двойной отправки
        const originalButtonText = notifyButton.innerHTML;
        notifyButton.disabled = true;
        notifyButton.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Отправка...';
        
        try {
          const result = await mockSubscribeEmail(email);
          
          if (result.success) {
            showMessage(result.message, true);
            // Очищаем поле ввода после успешной подписки
            emailInput.value = '';
          } else {
            showMessage(result.message || 'Ошибка подписки. Попробуйте позже.', false);
          }
        } catch (error) {
          // На случай непредвиденной ошибки
          showMessage('Произошла ошибка. Проверьте соединение.', false);
          console.error('Notify error:', error);
        } finally {
          // Возвращаем кнопку в исходное состояние
          notifyButton.disabled = false;
          notifyButton.innerHTML = originalButtonText;
        }
      }

      // Назначаем обработчик события на кнопку
      if (notifyButton) {
        notifyButton.addEventListener('click', handleNotifyClick);
      }

      // Дополнительно: отправка по нажатию Enter в поле ввода
      if (emailInput) {
        emailInput.addEventListener('keypress', function(event) {
          if (event.key === 'Enter') {
            event.preventDefault();
            handleNotifyClick();
          }
        });
      }

      // Автоматическая очистка сообщения при вводе нового текста (опционально)
      if (emailInput) {
        emailInput.addEventListener('input', function() {
          // Убираем сообщение об ошибке/успехе когда пользователь начинает печатать
          if (formMessage && formMessage.innerHTML.trim() !== '') {
            showMessage('');
          }
        });
      }
    })();
  </script>
</body>
</html>
